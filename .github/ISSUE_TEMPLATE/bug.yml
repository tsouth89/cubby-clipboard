name: Bug report
description: Tell us about a reproducible problem in Cubby.
title: '[Bug]: '
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Thanks for helping improve Cubby. Never paste private clipboard content, credentials, or tokens here.
  - type: input
    id: version
    attributes:
      label: Cubby version
      placeholder: v1.0.2
    validations:
      required: true
  - type: dropdown
    id: architecture
    attributes:
      label: Windows architecture
      options:
        - x64
        - ARM64
        - Not sure
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Explain the problem without including sensitive clipboard content.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open Cubby with Win+V
        2. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add sanitized screenshots or logs if useful.
