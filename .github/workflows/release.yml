name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: 'release-${{ github.ref }}'
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate:
    name: Validate release candidate
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 9

      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      # Cache the cargo registry + src-tauri/target across runs so the cargo test
      # and clippy compiles below are incremental instead of cold every run.
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # Install a prebuilt cargo-audit binary instead of compiling it from source
      # (cargo install cargo-audit) on every run.
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - run: pnpm install --frozen-lockfile
      - run: pnpm run format:check
      - run: pnpm run release:check
      - run: pnpm run build
      - run: pnpm audit --prod
      - shell: pwsh
        run: ./scripts/audit-rust.ps1
      - run: cargo fmt --manifest-path src-tauri/Cargo.toml --check
      - run: cargo test --manifest-path src-tauri/Cargo.toml --all-targets
      - run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

  create-release:
    name: Create GitHub release
    # Intentionally does NOT depend on validate: the release object is only ever a
    # draft here, so it can be created in parallel with validation. publish-release
    # gates on validate, so an unvalidated build never becomes public.
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.release.outputs.id }}
      tag: ${{ steps.metadata.outputs.tag }}
      version: ${{ steps.metadata.outputs.version }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 20

      - name: Validate version and prepare release metadata
        id: metadata
        shell: bash
        run: |
          VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          CARGO_VERSION=$(node -e "const fs=require('fs'); const text=fs.readFileSync('src-tauri/Cargo.toml','utf8'); const match=text.match(/^version = \"([^\"]+)\"/m); if (!match) process.exit(1); process.stdout.write(match[1])")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")

          if [ "$VERSION" != "$CARGO_VERSION" ] || [ "$VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Version mismatch: tauri=$VERSION cargo=$CARGO_VERSION package=$PACKAGE_VERSION"
            exit 1
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=draft-${{ github.sha }}" >> "$GITHUB_OUTPUT"
            echo "name=Cubby Clipboard v${VERSION} test build" >> "$GITHUB_OUTPUT"
            echo "draft=true" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            EXPECTED_TAG="v${VERSION}"
            if [ "${{ github.ref_name }}" != "$EXPECTED_TAG" ]; then
              echo "Tag ${{ github.ref_name }} does not match configured version $EXPECTED_TAG"
              exit 1
            fi
            echo "tag=$EXPECTED_TAG" >> "$GITHUB_OUTPUT"
            echo "name=Cubby Clipboard $EXPECTED_TAG" >> "$GITHUB_OUTPUT"
            echo "draft=false" >> "$GITHUB_OUTPUT"
            if [[ "$VERSION" == *-* ]]; then
              echo "prerelease=true" >> "$GITHUB_OUTPUT"
            else
              echo "prerelease=false" >> "$GITHUB_OUTPUT"
            fi
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Extract changelog
        id: changelog
        shell: bash
        run: |
          VERSION="${{ steps.metadata.outputs.version }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            BODY="Test build for v${VERSION} from commit ${{ github.sha }}, signed with Azure Trusted Signing. For release-candidate testing only."
          else
            BODY=$(awk -v heading="## v${VERSION}" '
              $0 == heading { capture=1; next }
              capture && /^## v/ { exit }
              capture { print }
            ' CHANGELOG.md)
            if [ -z "$BODY" ]; then
              echo "CHANGELOG.md has no section for v${VERSION}"
              exit 1
            fi
          fi

          DELIMITER=$(openssl rand -hex 12)
          echo "body<<$DELIMITER" >> "$GITHUB_OUTPUT"
          echo "$BODY" >> "$GITHUB_OUTPUT"
          echo "$DELIMITER" >> "$GITHUB_OUTPUT"

      - name: Remove previous test-build drafts
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release list -R "${{ github.repository }}" --limit 50 \
            --json tagName,isDraft,name \
            --jq '.[] | select(.isDraft and (.name | test("test build"))) | .tagName' \
          | while read -r tag; do
              if [ -n "$tag" ]; then
                echo "Deleting stale test-build draft: $tag"
                gh release delete "$tag" -R "${{ github.repository }}" --yes || true
              fi
            done

      - name: Create release
        id: release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.metadata.outputs.tag }}
          name: ${{ steps.metadata.outputs.name }}
          body: ${{ steps.changelog.outputs.body }}
          target_commitish: ${{ github.sha }}
          draft: true
          prerelease: ${{ steps.metadata.outputs.prerelease }}

  build-installers:
    name: Build ${{ matrix.arch }} installer
    needs: create-release
    runs-on: windows-latest
    environment: release
    permissions:
      contents: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            target: x86_64-pc-windows-msvc
          - arch: arm64
            target: aarch64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 9

      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Per-target cargo cache (keyed by matrix.target so x64 and arm64 don't
      # clobber each other) to keep the installer compiles incremental.
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.target }}

      - run: pnpm install --frozen-lockfile

      - name: Build NSIS installer
        uses: tauri-apps/tauri-action@v1
        env:
          # createUpdaterArtifacts is on, so the build needs the updater key.
          # This produces a .sig over the UNSIGNED installer; it is regenerated
          # after Trusted Signing below so it matches the bytes users download.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: .
          args: --target ${{ matrix.target }} --bundles nsis

      - name: Locate the built installer
        id: installer
        shell: pwsh
        run: |
          $file = Get-ChildItem "src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*-setup.exe" | Select-Object -First 1
          if (-not $file) {
            Write-Error "No NSIS installer was produced"
            exit 1
          }
          # The signing action requires a rooted (absolute) path; $file.FullName is a Windows-rooted path.
          "path=$($file.FullName)" >> $env:GITHUB_OUTPUT
          "name=$($file.Name -replace ' ', '.')" >> $env:GITHUB_OUTPUT

      - name: Sign in to Azure with GitHub OIDC
        uses: azure/login@v3
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Sign the installer with Trusted Signing
        uses: Azure/artifact-signing-action@v2
        with:
          endpoint: ${{ vars.ARTIFACT_SIGNING_ENDPOINT }}
          signing-account-name: ${{ vars.ARTIFACT_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ vars.ARTIFACT_SIGNING_CERTIFICATE_PROFILE_NAME }}
          files: ${{ steps.installer.outputs.path }}
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Upload the signed installer
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.create-release.outputs.tag }}
        run: |
          Copy-Item "${{ steps.installer.outputs.path }}" "${{ steps.installer.outputs.name }}"
          gh release upload "$env:TAG" "${{ steps.installer.outputs.name }}" --clobber

      - name: Re-sign the installer for the updater (over the signed bytes)
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          # The updater verifies a signature over the installer's exact bytes.
          # Trusted Signing changed those bytes after build, so regenerate the
          # .sig over the signed installer. Overwrites the build-time .sig.
          pnpm tauri signer sign --private-key "$env:TAURI_SIGNING_PRIVATE_KEY" --password "$env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD" "${{ steps.installer.outputs.path }}"
          Copy-Item "${{ steps.installer.outputs.path }}.sig" "${{ steps.installer.outputs.name }}.sig"

      - name: Upload the updater signature
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.create-release.outputs.tag }}
        run: |
          gh release upload "$env:TAG" "${{ steps.installer.outputs.name }}.sig" --clobber

      - name: Assemble the portable package
        if: matrix.arch == 'x64'
        id: portable
        shell: pwsh
        run: |
          $stage = Join-Path (Get-Location) "portable"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item "src-tauri/target/${{ matrix.target }}/release/cubby.exe" (Join-Path $stage "Cubby Clipboard.exe")
          # The marker's presence next to the exe switches Cubby to portable mode.
          Set-Content -Path (Join-Path $stage "portable.txt") -Value @(
            "This file makes Cubby run in portable mode. Keep it next to Cubby Clipboard.exe.",
            "Your clipboard history is stored in the 'data' folder here, not in AppData."
          )
          Set-Content -Path (Join-Path $stage "README.txt") -Value @(
            "Cubby Clipboard - Portable",
            "",
            "Run 'Cubby Clipboard.exe'. Everything (history, settings, images) is stored in",
            "the 'data' folder next to it, and nothing is written to AppData or the registry.",
            "",
            "Your history is encrypted with your Windows account, so this portable copy works",
            "fully on this PC and account. Moved to a different PC or Windows user, it starts",
            "a fresh history there.",
            "",
            "Requires Windows 10/11 (WebView2, which ships with Windows 11)."
          )
          "exe=$(Join-Path $stage 'Cubby Clipboard.exe')" >> $env:GITHUB_OUTPUT

      - name: Sign the portable executable
        if: matrix.arch == 'x64'
        uses: Azure/artifact-signing-action@v2
        with:
          endpoint: ${{ vars.ARTIFACT_SIGNING_ENDPOINT }}
          signing-account-name: ${{ vars.ARTIFACT_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ vars.ARTIFACT_SIGNING_CERTIFICATE_PROFILE_NAME }}
          files: ${{ steps.portable.outputs.exe }}
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Zip and upload the portable package
        if: matrix.arch == 'x64'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.create-release.outputs.tag }}
          VERSION: ${{ needs.create-release.outputs.version }}
        run: |
          $zip = "Cubby-Clipboard-Portable-$($env:VERSION)-x64.zip"
          Compress-Archive -Path "portable/*" -DestinationPath $zip -Force
          gh release upload "$env:TAG" $zip --clobber

  updater-manifest:
    name: Assemble updater manifest
    needs: [create-release, build-installers]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - name: Build and upload latest.json
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.create-release.outputs.tag }}
          VERSION: ${{ needs.create-release.outputs.version }}
        run: |
          REPO="tsouth89/cubby-clipboard"
          NAME_X64="Cubby.Clipboard_${VERSION}_x64-setup.exe"
          NAME_ARM="Cubby.Clipboard_${VERSION}_arm64-setup.exe"
          BASE="https://github.com/${REPO}/releases/download/${TAG}"
          gh release download "$TAG" -R "$REPO" -p "${NAME_X64}.sig" -p "${NAME_ARM}.sig" -D sigs
          SIG_X64=$(cat "sigs/${NAME_X64}.sig")
          SIG_ARM=$(cat "sigs/${NAME_ARM}.sig")
          PUB_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          jq -n \
            --arg v "$VERSION" --arg d "$PUB_DATE" \
            --arg sx "$SIG_X64" --arg ux "${BASE}/${NAME_X64}" \
            --arg sa "$SIG_ARM" --arg ua "${BASE}/${NAME_ARM}" \
            '{version:$v, pub_date:$d, platforms:{"windows-x86_64":{signature:$sx,url:$ux},"windows-aarch64":{signature:$sa,url:$ua}}}' \
            > latest.json
          gh release upload "$TAG" latest.json --clobber

  publish-release:
    name: Publish validated release
    if: github.event_name != 'workflow_dispatch'
    # Gate publishing on validate too, since create-release/build no longer do.
    needs: [validate, create-release, build-installers, updater-manifest]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.create-release.outputs.tag }}
        # -R is required: this job has no checkout, so gh has no git context.
        run: gh release edit "$RELEASE_TAG" -R ${{ github.repository }} --draft=false
