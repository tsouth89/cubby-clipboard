name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: 'release-${{ github.ref }}'
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate:
    name: Validate release candidate
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - run: pnpm install --frozen-lockfile
      - run: pnpm run format:check
      - run: pnpm run release:check
      - run: pnpm run build
      - run: pnpm audit --prod
      - run: cargo install cargo-audit --locked
      - shell: pwsh
        run: ./scripts/audit-rust.ps1
      - run: cargo fmt --manifest-path src-tauri/Cargo.toml --check
      - run: cargo test --manifest-path src-tauri/Cargo.toml --all-targets
      - run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

  create-release:
    name: Create GitHub release
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.release.outputs.id }}
      tag: ${{ steps.metadata.outputs.tag }}
      version: ${{ steps.metadata.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Validate version and prepare release metadata
        id: metadata
        shell: bash
        run: |
          VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          CARGO_VERSION=$(node -e "const fs=require('fs'); const text=fs.readFileSync('src-tauri/Cargo.toml','utf8'); const match=text.match(/^version = \"([^\"]+)\"/m); if (!match) process.exit(1); process.stdout.write(match[1])")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")

          if [ "$VERSION" != "$CARGO_VERSION" ] || [ "$VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Version mismatch: tauri=$VERSION cargo=$CARGO_VERSION package=$PACKAGE_VERSION"
            exit 1
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=draft-${{ github.sha }}" >> "$GITHUB_OUTPUT"
            echo "name=Cubby Clipboard v${VERSION} test build" >> "$GITHUB_OUTPUT"
            echo "draft=true" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            EXPECTED_TAG="v${VERSION}"
            if [ "${{ github.ref_name }}" != "$EXPECTED_TAG" ]; then
              echo "Tag ${{ github.ref_name }} does not match configured version $EXPECTED_TAG"
              exit 1
            fi
            echo "tag=$EXPECTED_TAG" >> "$GITHUB_OUTPUT"
            echo "name=Cubby Clipboard $EXPECTED_TAG" >> "$GITHUB_OUTPUT"
            echo "draft=false" >> "$GITHUB_OUTPUT"
            if [[ "$VERSION" == *-* ]]; then
              echo "prerelease=true" >> "$GITHUB_OUTPUT"
            else
              echo "prerelease=false" >> "$GITHUB_OUTPUT"
            fi
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Extract changelog
        id: changelog
        shell: bash
        run: |
          VERSION="${{ steps.metadata.outputs.version }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            BODY="Test build for v${VERSION} from commit ${{ github.sha }}, signed with Azure Trusted Signing. For release-candidate testing only."
          else
            BODY=$(awk -v heading="## v${VERSION}" '
              $0 == heading { capture=1; next }
              capture && /^## v/ { exit }
              capture { print }
            ' CHANGELOG.md)
            if [ -z "$BODY" ]; then
              echo "CHANGELOG.md has no section for v${VERSION}"
              exit 1
            fi
          fi

          DELIMITER=$(openssl rand -hex 12)
          echo "body<<$DELIMITER" >> "$GITHUB_OUTPUT"
          echo "$BODY" >> "$GITHUB_OUTPUT"
          echo "$DELIMITER" >> "$GITHUB_OUTPUT"

      - name: Create release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.metadata.outputs.tag }}
          name: ${{ steps.metadata.outputs.name }}
          body: ${{ steps.changelog.outputs.body }}
          target_commitish: ${{ github.sha }}
          draft: true
          prerelease: ${{ steps.metadata.outputs.prerelease }}

  build-installers:
    name: Build ${{ matrix.arch }} installer
    needs: create-release
    runs-on: windows-latest
    environment: release
    permissions:
      contents: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            target: x86_64-pc-windows-msvc
          - arch: arm64
            target: aarch64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}

      - run: pnpm install --frozen-lockfile

      - name: Build NSIS installer
        uses: tauri-apps/tauri-action@v1
        with:
          projectPath: .
          args: --target ${{ matrix.target }} --bundles nsis

      - name: Locate the built installer
        id: installer
        shell: pwsh
        run: |
          $file = Get-ChildItem "src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*-setup.exe" | Select-Object -First 1
          if (-not $file) {
            Write-Error "No NSIS installer was produced"
            exit 1
          }
          # The signing action requires a rooted (absolute) path; $file.FullName is a Windows-rooted path.
          "path=$($file.FullName)" >> $env:GITHUB_OUTPUT
          "name=$($file.Name -replace ' ', '.')" >> $env:GITHUB_OUTPUT

      - name: Sign in to Azure with GitHub OIDC
        uses: azure/login@v3
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Sign the installer with Trusted Signing
        uses: Azure/artifact-signing-action@v2
        with:
          endpoint: ${{ vars.ARTIFACT_SIGNING_ENDPOINT }}
          signing-account-name: ${{ vars.ARTIFACT_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ vars.ARTIFACT_SIGNING_CERTIFICATE_PROFILE_NAME }}
          files: ${{ steps.installer.outputs.path }}
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Upload the signed installer
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.create-release.outputs.tag }}
        run: |
          Copy-Item "${{ steps.installer.outputs.path }}" "${{ steps.installer.outputs.name }}"
          gh release upload "$env:TAG" "${{ steps.installer.outputs.name }}" --clobber

  publish-release:
    name: Publish validated release
    if: github.event_name != 'workflow_dispatch'
    needs: [create-release, build-installers]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.create-release.outputs.tag }}
        run: gh release edit "$RELEASE_TAG" --draft=false
