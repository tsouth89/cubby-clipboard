name: Website

on:
  pull_request:
    paths:
      - 'product_pages/**'
      - 'docs/WEBSITE_DEPLOYMENT.md'
      - '.github/scripts/check-site.mjs'
      - '.github/workflows/website.yml'
  push:
    branches:
      - main
    paths:
      - 'product_pages/**'
      - 'docs/WEBSITE_DEPLOYMENT.md'
      - '.github/scripts/check-site.mjs'
      - '.github/workflows/website.yml'
  workflow_dispatch:

concurrency:
  group: 'website-${{ github.ref }}'
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: node .github/scripts/check-site.mjs
      - run: node --test product_pages/worker.test.mjs
