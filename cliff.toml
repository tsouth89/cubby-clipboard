[changelog]
header = ""
body = """
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group }}
{% for commit in commits %}
- {{ commit.message | split(pat="\n") | first | trim }}
{%- endfor %}
{% endfor %}
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
commit_parsers = [
    { message = "^feat", group = "Features / 新功能" },
    { message = "^fix", group = "Bug Fixes / 修复" },
    { message = "^perf", group = "Performance / 性能优化" },
    { message = "^refactor", group = "Refactor / 重构" },
    { message = "^docs", group = "Documentation / 文档" },
    { message = "^style", group = "Style / 样式" },
    { message = "^test", group = "Tests / 测试" },
    { message = "^ci", group = "CI / 持续集成" },
    { message = "^chore", group = "Chores / 杂项" },
    { message = "^build", group = "Build / 构建" },
]
filter_commits = true
tag_pattern = "v[0-9].*"
